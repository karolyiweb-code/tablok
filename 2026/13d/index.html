<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>13.D Tabló – 2026</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body.dark { background:#121212; color:#e0e0e0; }
body.dark .modal-content { background:#1e1e1e; color:#fff; }
body.dark .student-name { color:#fff; }

.student-card {
  width:100%; aspect-ratio:1/1; border-radius:50%;
  overflow:hidden; cursor:pointer;
  transition:transform .25s, box-shadow .25s;
}
.student-card img { width:100%; height:100%; object-fit:cover; transition:.45s; }
.student-card:hover { transform:translateY(-6px); box-shadow:0 12px 24px rgba(0,0,0,.25); }
.student-card:hover img { transform:scale(1.18); }

.student-name { font-weight:600; margin-top:10px; }

#modalImage {
  opacity:1;
  transition:opacity .3s ease;
}

.modal-nav-btn {
  position:absolute; top:50%; transform:translateY(-50%);
  font-size:2.5rem; color:#007bff;
  cursor:pointer; padding:10px;
  user-select:none; z-index:10;
  transition:.2s;
}
.modal-nav-btn:hover { color:#3399ff; }
.modal-prev { left:10px; }
.modal-next { right:10px; }

#modalImage {
  max-width:50%; height:auto; margin:0 auto;
}

.mini-index {
  overflow-x:auto; white-space:nowrap;
  padding-bottom:10px;
}
.mini-index img {
  width:60px; height:60px; border-radius:50%;
  object-fit:cover; opacity:.6; cursor:pointer;
  transition:.2s; margin:4px;
}
.mini-index img.active { opacity:1; border:3px solid #4444ff; }

.dark-toggle {
  position:fixed; bottom:20px; right:20px;
  background:#222; color:#fff; border:none;
  padding:12px 18px; border-radius:8px;
  cursor:pointer; z-index:9999;
}

.close-btn {
  position:absolute; top:10px; right:10px;
  background:#cc0000; color:white; border:none;
  font-size:1.4rem; width:38px; height:38px;
  border-radius:50%; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:.2s; z-index:20;
}
.close-btn:hover { background:#ff0000; }
</style>
</head>

<body>

<button class="dark-toggle" id="darkToggle">🌙 Dark Mode</button>

<div class="container py-5">

  <div class="text-center mb-5">
    <img src="img/tablo_26_13d.jpg" class="img-fluid rounded shadow" alt="13.D Tablókép">
  </div>

  <h1 class="text-center mb-4">13.D</h1>
  <h2 class="text-center mb-4">2021–2026</h2>

  <div class="row g-4 justify-content-center" id="studentGrid"></div>

</div>

<!-- MODÁL -->
<div class="modal fade" id="studentModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content position-relative">

      <button type="button" class="close-btn" data-bs-dismiss="modal">✕</button>

      <span class="modal-nav-btn modal-prev">&lsaquo;</span>
      <span class="modal-nav-btn modal-next">&rsaquo;</span>

      <div class="modal-body p-0 text-center">
        <img id="modalImage" src="" class="img-fluid rounded" alt="">
      </div>

      <div class="p-3 text-center">
        <h5 id="modalName" class="fw-bold"></h5>
      </div>

      <div class="p-2 text-center mini-index d-flex flex-nowrap" id="miniIndex"></div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// ----------------------------
// XML BETÖLTÉSE
// ----------------------------
function loadXMLStudents(callback) {
    fetch("students13d26.xml")
        .then(response => response.text())
        .then(xmlText => {
            const parser = new DOMParser();
            const xml = parser.parseFromString(xmlText, "text/xml");

            const students = [...xml.getElementsByTagName("student")].map(s => ({
                name: s.getElementsByTagName("name")[0].textContent,
                image: s.getElementsByTagName("image")[0].textContent
            }));

            callback(students);
        });
}

// ----------------------------
// TABLÓ FELÉPÍTÉSE
// ----------------------------
function initTablo(students) {

    // GRID FELTÖLTÉSE
    const grid = document.getElementById("studentGrid");
    grid.innerHTML = "";

    students.forEach((s, index) => {
        grid.innerHTML += `
            <div class="col-6 col-md-3 col-lg-2 text-center">
              <div class="student-card" data-index="${index}" title="${s.name}">
                <img src="img/${s.image}" alt="${s.name}">
              </div>
              <p class="student-name">${s.name}</p>
            </div>
        `;
    });

    // MODÁL LOGIKA
    let currentIndex = 0;
    const modal = new bootstrap.Modal(document.getElementById("studentModal"));
    const modalImage = document.getElementById("modalImage");
    const modalName = document.getElementById("modalName");
    const miniIndex = document.getElementById("miniIndex");

    miniIndex.innerHTML = "";

    students.forEach((s, i) => {
        const img = document.createElement("img");
        img.src = "img/" + s.image;
        img.dataset.index = i;
        img.addEventListener("click", () => {
            currentIndex = i;
            loadStudent();
        });
        miniIndex.appendChild(img);
    });

    function centerMiniIndex() {
        const activeThumb = miniIndex.querySelector("img.active");
        if (!activeThumb) return;

        const containerWidth = miniIndex.clientWidth;
        const thumbLeft = activeThumb.offsetLeft;
        const thumbWidth = activeThumb.clientWidth;

        const scrollTo = thumbLeft - (containerWidth / 2) + (thumbWidth / 2);

        miniIndex.scrollTo({ left: scrollTo, behavior: "smooth" });
    }

    function loadStudent() {
        const thumbs = miniIndex.querySelectorAll("img");
        thumbs.forEach(t => t.classList.remove("active"));
        thumbs[currentIndex].classList.add("active");

        modalImage.style.opacity = 0;

        setTimeout(() => {
            modalImage.src = "img/" + students[currentIndex].image;
            modalName.innerText = students[currentIndex].name;
            modalImage.style.opacity = 1;
            centerMiniIndex();
        }, 150);
    }

    document.querySelectorAll(".student-card").forEach(card => {
        card.addEventListener("click", () => {
            currentIndex = parseInt(card.dataset.index);
            loadStudent();
            modal.show();
        });
    });

    document.querySelector(".modal-next").addEventListener("click", () => {
        currentIndex = (currentIndex + 1) % students.length;
        loadStudent();
    });

    document.querySelector(".modal-prev").addEventListener("click", () => {
        currentIndex = (currentIndex - 1 + students.length) % students.length;
        loadStudent();
    });

    document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") modal.hide();
    });

    document.addEventListener("keydown", (e) => {
        if (!document.getElementById("studentModal").classList.contains("show")) return;

        if (e.key === "ArrowRight") {
            currentIndex = (currentIndex + 1) % students.length;
            loadStudent();
        }
        if (e.key === "ArrowLeft") {
            currentIndex = (currentIndex - 1 + students.length) % students.length;
            loadStudent();
        }
    });

    // DARK MODE
    document.getElementById("darkToggle").addEventListener("click", () => {
        document.body.classList.toggle("dark");
    });
}

// ----------------------------
// INDÍTÁS
// ----------------------------
loadXMLStudents((students) => {
    initTablo(students);
});
</script>

</body>
</html>
